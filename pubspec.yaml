name: biomech_coach
description: "Real-time biomechanical form tracker & virtual coach for powerlifters."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & Pose Detection
  camera: ^0.11.0+2
  google_mlkit_pose_detection: ^0.12.0

  # Text-to-Speech Coach
  flutter_tts: ^4.2.0

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # State Management
  provider: ^6.1.2

  # Charts for Journal
  fl_chart: ^0.69.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  share_plus: ^12.0.2
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
